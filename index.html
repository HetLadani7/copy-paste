<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[ᴄᴏᴘʏ-ᴘᴀꜱᴛᴇ] - Secure Temporary Content Sharing</title>
  <meta name="description" content="Share text, images, and files securely with temporary numeric codes that expire automatically after 5 minutes.">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Decorative background glow components -->
  <div class="glow-bg glow-violet"></div>
  <div class="glow-bg glow-cyan"></div>
  <div class="grid-overlay"></div>

  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-area">
        <img class="logo-img-small" src="logo.png" alt="[ᴄᴏᴘʏ-ᴘᴀꜱᴛᴇ] Logo" />
        <h1 id="app-title" class="gradient-text">[ᴄᴏᴘʏ-ᴘᴀꜱᴛᴇ]</h1>
      </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="tab-navigation" aria-label="Main Navigation">
      <button id="tab-send" class="tab-btn active" role="tab" aria-selected="true" aria-controls="pane-send">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        <span>Share Content</span>
      </button>
      <button id="tab-receive" class="tab-btn" role="tab" aria-selected="false" aria-controls="pane-receive">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 17 12 21 16 17"></polyline><line x1="12" y1="12" x2="12" y2="21"></line><path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.29"></path></svg>
        <span>Receive Content</span>
      </button>
    </nav>

    <!-- App Main Panel (Glass container) -->
    <main class="glass-panel">
      
      <!-- SENDER PANEL -->
      <section id="pane-send" class="tab-pane active" role="tabpanel">
        <div class="content-toggle-container">
          <button id="toggle-text" class="toggle-btn active">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            <span>Text / Paragraph</span>
          </button>
          <button id="toggle-file" class="toggle-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
            <span>Image / File</span>
          </button>
        </div>

        <!-- Input Section -->
        <div id="input-container">
          <!-- Text Input Area -->
          <div id="text-input-wrapper" class="input-wrapper">
            <label for="share-text" class="sr-only">Enter content to share</label>
            <textarea id="share-text" placeholder="Type or paste your secure temporary content here..." maxlength="50000"></textarea>
            <div class="textarea-footer">
              <span id="char-counter">0 / 50000 characters</span>
            </div>
          </div>

          <!-- File Input Area (Hidden initially) -->
          <div id="file-input-wrapper" class="input-wrapper hidden">
            <div id="dropzone" class="dropzone">
              <input type="file" id="file-uploader" class="file-uploader-input" />
              <div class="dropzone-content">
                <button type="button" class="browse-btn-premium browse-link">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                  <span>Browse</span>
                </button>
              </div>
              <div id="file-details" class="file-details hidden">
                <div class="file-icon-large">
                  <svg id="preview-generic-icon" class="" xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                  <img id="preview-image" class="hidden" src="" alt="Preview" />
                </div>
                <div class="file-meta">
                  <span id="file-name" class="file-name">filename.txt</span>
                  <span id="file-size" class="file-size">0 KB</span>
                </div>
                <button type="button" id="remove-file-btn" class="icon-btn remove-btn" title="Remove File">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
              </div>
            </div>
          </div>
        </div>

        <button id="btn-create-code" class="action-btn share-btn">
          <span>Generate Share Code</span>
          <div class="spinner hidden" id="share-spinner"></div>
        </button>

        <!-- Share Output View (Hidden initially) -->
        <div id="share-success-view" class="success-card hidden">
          <div class="success-header">
            <div class="success-badge">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
              <span>Sharing Active</span>
            </div>
            <div class="timer-badge">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="timer-spin"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
              <span id="share-timer">05:00</span>
            </div>
          </div>
          
          <div class="code-display-box">
            <span class="code-label">YOUR SHARING CODE</span>
            <div class="code-row">
              <span id="generated-code" class="numeric-code">123 456</span>
              <button id="btn-copy-code" class="copy-icon-btn" title="Copy Code">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="copy-svg"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="check-svg hidden"><polyline points="20 6 9 17 4 12"></polyline></svg>
              </button>
            </div>
          </div>

          
          
          <div class="progress-bar-container">
            <div id="timer-progress" class="timer-progress-fill"></div>
          </div>

          <button id="btn-reset-sender" class="btn-text-only">Share New Content</button>
        </div>
      </section>

      <!-- RECEIVER PANEL -->
      <section id="pane-receive" class="tab-pane hidden" role="tabpanel">
        
        <div id="receive-entry-view">
          <p class="section-desc">Enter the 4-digit numeric code you received to download or view the shared content.</p>
          
          <!-- Premium 4-digit code inputs -->
          <div class="code-inputs-container">
            <input type="text" pattern="[0-9]*" inputmode="numeric" maxlength="1" class="code-digit-input" id="digit-1" aria-label="Digit 1" />
            <input type="text" pattern="[0-9]*" inputmode="numeric" maxlength="1" class="code-digit-input" id="digit-2" aria-label="Digit 2" />
            <input type="text" pattern="[0-9]*" inputmode="numeric" maxlength="1" class="code-digit-input" id="digit-3" aria-label="Digit 3" />
            <input type="text" pattern="[0-9]*" inputmode="numeric" maxlength="1" class="code-digit-input" id="digit-4" aria-label="Digit 4" />
          </div>

          <button id="btn-retrieve" class="action-btn retrieve-btn">
            <span>Access Secure Content</span>
            <div class="spinner hidden" id="retrieve-spinner"></div>
          </button>
        </div>

        <!-- Retrieve Result View (Hidden initially) -->
        <div id="receive-result-view" class="success-card hidden">
          <div class="success-header">
            <div class="success-badge">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
              <span>Decrypted Successfully</span>
            </div>
            <div class="timer-badge">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="timer-spin"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
              <span id="receive-timer">05:00</span>
            </div>
          </div>

          <!-- Decrypted Content Displays -->
          <div id="result-content-container">
            <!-- Text Result Template -->
            <div id="result-text-box" class="result-box hidden">
              <textarea id="retrieved-text" readonly></textarea>
              <button id="btn-copy-retrieved" class="action-btn copy-btn-large">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                <span>Copy Text</span>
              </button>
            </div>

            <!-- File Result Template -->
            <div id="result-file-box" class="result-box hidden">
              <div class="file-display-card">
                <div id="file-preview-area" class="file-preview-area">
                  <!-- Dynamic preview goes here (image tag or large document icon) -->
                  <div id="file-generic-icon" class="file-generic-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                  </div>
                  <img id="file-img-preview" class="file-img-preview hidden" src="" alt="Shared Image Preview" />
                </div>
                <div class="file-info-row">
                  <div class="file-meta-receive">
                    <h3 id="retrieved-file-name" class="retrieved-file-name">filename.zip</h3>
                    <span id="retrieved-file-size" class="retrieved-file-size">0 KB</span>
                  </div>
                  <a id="btn-download-file" href="#" class="action-btn download-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    <span>Download File</span>
                  </a>
                </div>
              </div>
            </div>
          </div>

          <div class="progress-bar-container">
            <div id="receive-timer-progress" class="timer-progress-fill"></div>
          </div>

          <button id="btn-reset-receiver" class="btn-text-only">Retrieve Another Code</button>
        </div>
      </section>

      <!-- GLOBAL NOTIFICATION BANNER -->
      <div id="toast" class="toast hidden" role="alert" aria-live="polite">
        <span id="toast-message">Message copied successfully!</span>
      </div>

    </main>


  </div>

  <!-- Scripts -->
  <script src="app.js"></script>
</body>
</html>
